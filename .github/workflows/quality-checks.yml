# Quality Checks — type-check / lint / i18n 同步
# Story 22-4 AC8 (SDLC-08)：CI 強制 type-check + lint + i18n
# 此 workflow 為 Day 1 required（非 advisory）；對應 npm scripts: type-check / lint / i18n:check
name: Quality Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run type-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  i18n-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run i18n:check

  # CHANGE-104：CHANGE/FIX 文檔一致性
  #   R1 編號不得重複 | R2 必須有可解析的狀態欄位 | R3 STATUS.md 必須與現況相符
  #   新增 CHANGE/FIX 或改其狀態後，需執行 `npm run docs:status` 並一併提交，否則此 job 會失敗。
  #   （無需 npm ci —— 腳本只用 Node 內建模組）
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm run docs:check
